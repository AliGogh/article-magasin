{% extends "base.html" %}

{% block title %}Profil{% endblock %}

{% block content %}

<h2>Profil</h2>

<div class="card">
    <h3>Compte</h3>
    <p><strong>Courriel :</strong> {{ utilisateur.courriel }}</p>
    <p><strong>Solde actuel :</strong> {{ "%.2f"|format(utilisateur.soldeCompte) }} $</p>
</div>

<div class="card">
    <h3>Ajouter de l'argent</h3>
    <form method="POST" action="{{ url_for('ajouter_solde') }}" class="inline-form">
        <label>
            Montant
            <input type="number" name="montant" min="0.01" step="0.01" required>
        </label>
        <button type="submit">Ajouter au solde</button>
    </form>
</div>

{% endblock %}
