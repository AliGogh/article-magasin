<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mon Magasin{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    {% if request.path != '/' %}
    <nav class="navbar">
        <a href="{{ url_for('index') }}">Accueil</a>
        <a href="{{ url_for('get_produits') }}">Produits</a>
        <a href="{{ url_for('inscription') }}">S'inscrire</a>
        <a href="{{ url_for('connexion') }}">Se connecter</a>
        <a href="{{ url_for('deconnexion') }}">Déconnexion</a>
    </nav>
    {% endif %}

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-container">
                {% for message in messages %}
                    <p class="flash-message">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
